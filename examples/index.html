<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:," />
    <title>emtionji example</title>
    <style>
      :root {
        color: #23271f;
        background: #f4f1e8;
        font-family: Inter, "PingFang SC", system-ui, sans-serif;
        font-synthesis: none;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-width: 320px;
        min-height: 100vh;
        margin: 0;
      }

      button {
        color: inherit;
        font: inherit;
      }

      #app {
        min-height: 100vh;
      }

      main {
        width: min(1180px, calc(100% - 32px));
        margin: 0 auto;
        padding: 36px 0 44px;
      }

      header {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 24px;
        margin-bottom: 22px;
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      h1 {
        font-size: clamp(28px, 4vw, 42px);
        letter-spacing: -0.04em;
      }

      .lede {
        max-width: 540px;
        color: #69705f;
        line-height: 1.65;
      }

      .workbench {
        display: grid;
        grid-template-columns: minmax(320px, 0.9fr) minmax(420px, 1.1fr);
        height: clamp(520px, calc(100vh - 170px), 660px);
        overflow: hidden;
        border: 1px solid rgb(35 39 31 / 10%);
        border-radius: 30px;
        background: rgb(255 255 255 / 65%);
        box-shadow: 0 18px 60px rgb(54 61 43 / 8%);
      }

      .preview,
      .code-panel {
        min-width: 0;
      }

      .preview {
        display: grid;
        place-items: center;
        align-content: center;
        gap: 22px;
        padding: 44px;
        overflow: hidden;
        background:
          radial-gradient(circle at 50% 45%, rgb(255 255 255 / 92%), rgb(241 238 226 / 65%) 58%, transparent 59%),
          linear-gradient(145deg, #f9f7f0, #ece8db);
      }

      .stage {
        display: grid;
        width: min(100%, 370px);
        aspect-ratio: 1;
        place-items: center;
        overflow: visible;
        border-radius: 34%;
        background: rgb(255 255 255 / 72%);
        box-shadow: inset 0 0 0 1px rgb(255 255 255 / 70%);
      }

      .selected-emoji.emtionji {
        font-size: clamp(190px, 24vw, 300px);
      }

      .preview-meta {
        display: grid;
        justify-items: center;
        gap: 6px;
        text-align: center;
      }

      .preview-meta strong {
        font-size: 17px;
      }

      output {
        min-height: 1.5em;
        color: #68705b;
        font-size: 14px;
      }

      .code-panel {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        min-height: 0;
        overflow: hidden;
        border-left: 1px solid rgb(35 39 31 / 9%);
        background: #20241e;
        color: #e8ecdf;
      }

      .code-heading {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 20px 24px;
        border-bottom: 1px solid rgb(255 255 255 / 8%);
      }

      .code-heading h2 {
        font-size: 15px;
        font-weight: 650;
      }

      .code-heading span {
        color: #9ca690;
        font: 12px ui-monospace, SFMono-Regular, Consolas, monospace;
      }

      pre {
        height: 100%;
        min-height: 0;
        margin: 0;
        padding: 24px;
        overflow: auto;
        color: #cfe5bc;
        font: 12px/1.65 ui-monospace, SFMono-Regular, Consolas, monospace;
        tab-size: 2;
        white-space: pre;
      }

      .picker-heading {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin: 28px 2px 12px;
      }

      .picker-heading h2 {
        font-size: 16px;
      }

      .picker-heading span {
        color: #747b6b;
        font-size: 13px;
      }

      .gallery {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(118px, 1fr));
        gap: 10px;
      }

      .emoji-card {
        display: grid;
        min-width: 0;
        min-height: 126px;
        place-items: center;
        align-content: center;
        gap: 9px;
        padding: 14px 8px 10px;
        border: 1px solid transparent;
        border-radius: 22px;
        background: rgb(255 255 255 / 58%);
        cursor: pointer;
        transition:
          border-color 160ms ease,
          background 160ms ease,
          box-shadow 160ms ease,
          transform 160ms ease;
      }

      .emoji-card:hover {
        transform: translateY(-2px);
        background: rgb(255 255 255 / 88%);
        box-shadow: 0 8px 24px rgb(54 61 43 / 8%);
      }

      .emoji-card[aria-pressed="true"] {
        border-color: #758766;
        background: #fff;
        box-shadow: 0 0 0 3px rgb(117 135 102 / 12%);
      }

      .emoji-card .emtionji {
        font-size: 66px;
      }

      .emoji-card span:last-child {
        width: 100%;
        overflow: hidden;
        color: #69705f;
        font: 10px ui-monospace, SFMono-Regular, Consolas, monospace;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      @media (max-width: 820px) {
        header {
          display: grid;
          align-items: start;
        }

        .workbench {
          grid-template-columns: 1fr;
          height: auto;
        }

        .preview {
          min-height: 430px;
          padding: 30px;
        }

        .code-panel {
          min-height: 440px;
          border-top: 1px solid rgb(35 39 31 / 9%);
          border-left: 0;
        }

        .selected-emoji.emtionji {
          font-size: clamp(180px, 60vw, 280px);
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module">
      import { createApp, h, ref } from "vue"
      import { AnimatedEmoji } from "../src"

      const emojiModules = import.meta.glob("./emojis/*.json", {
        eager: true,
        import: "default"
      })

      const emojiDefinitions = Object.entries(emojiModules)
        .map(([path, data]) => ({
          data,
          file: path.split("/").at(-1)
        }))
        .sort((a, b) => a.file.localeCompare(b.file))

      createApp({
        setup() {
          const selected = ref(emojiDefinitions[0])
          const state = ref("点击组件播放动画")

          const select = item => {
            selected.value = item
            state.value = "点击组件播放动画"
          }

          const reportError = error => {
            state.value = error instanceof Error ? error.message : String(error)
          }

          return () => h("main", [
            h("header", [
              h("h1", "emtionji core"),
              h("p", { class: "lede" }, "每个 Emoji 都由自己的 JSON 描述运动。选择下方组件，左侧体验动画，右侧查看当前配置。")
            ]),
            h("section", { class: "workbench", "aria-label": "组件工作台" }, [
              h("div", { class: "preview" }, [
                h("div", { class: "stage" }, [
                  h(AnimatedEmoji, {
                    key: selected.value.file,
                    class: "selected-emoji",
                    data: selected.value.data,
                    onPlay: emoji => { state.value = `${emoji} 动画播放中` },
                    onComplete: emoji => { state.value = `${emoji} 点击后再次播放` },
                    onError: reportError
                  })
                ]),
                h("div", { class: "preview-meta" }, [
                  h("strong", selected.value.file.replace(".json", "")),
                  h("output", { "aria-live": "polite" }, state.value)
                ])
              ]),
              h("aside", { class: "code-panel", "aria-label": "当前组件代码" }, [
                h("div", { class: "code-heading" }, [
                  h("h2", "动画配置"),
                  h("span", selected.value.file)
                ]),
                h("pre", [h("code", JSON.stringify(selected.value.data, null, 2))])
              ])
            ]),
            h("div", { class: "picker-heading" }, [
              h("h2", "选择组件"),
              h("span", `${emojiDefinitions.length} 个动画`)
            ]),
            h("section", { class: "gallery", "aria-label": "Emoji 动画组件" },
              emojiDefinitions.map(item =>
                h("button", {
                  key: item.file,
                  type: "button",
                  class: "emoji-card",
                  "aria-label": `选择 ${item.data.emoji} ${item.file}`,
                  "aria-pressed": selected.value.file === item.file ? "true" : "false",
                  onClick: () => select(item)
                }, [
                  h(AnimatedEmoji, {
                    data: item.data,
                    onPlay: () => select(item),
                    onError: reportError
                  }),
                  h("span", item.file.replace(".json", ""))
                ])
              )
            )
          ])
        }
      }).mount("#app")
    </script>
  </body>
</html>
